<!DOCTYPE html>
<html>
<head>
    <title>QuickLink | Analytics</title>
    <style>
        body {
            font-family: Arial;
            background:#f5f7ff;
        }

        .container {
            width: 900px;
            margin: 30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        th {
            background:#4361ee;
            color:white;
        }

        a {
            color:#4361ee;
            text-decoration:none;
            font-weight:500;
        }

        a:hover {
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Links Analytics</h2>

    <table>
        <tr>
            <th>Short Link</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Expires</th>
            <th>QR</th>
        </tr>

        {% for url in urls %}
        <tr>
            <td>
                <a href="/{{ url.short_code }}" target="_blank">
                    {{ request.host_url }}{{ url.short_code }}
                </a>
            </td>

            <td>{{ url.long_url }}</td>

            <td>{{ url.clicks }}</td>

            <td>
                {% if url.expires_at %}
                    {{ url.expires_at.date() }}
                {% else %}
                    Never
                {% endif %}
            </td>

            <td>
                <a href="/qr-page/{{ url.short_code }}">
                    View QR
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
