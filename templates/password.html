<!DOCTYPE html>
<html>
<head>
<title>Protected Link</title>
<style>
body {
    font-family: Arial;
    background: #f5f7ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    background: #4361ee;
    color: white;
    border: none;
}
.error {
    color: red;
}
</style>
</head>
<body>
<div class="box">
    <h2>🔒 Password Required</h2>
    <form method="POST">
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Unlock</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>
</body>
</html>
